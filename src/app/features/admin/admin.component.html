<div class="topbar">
  <div class="topbar-left">
    <span class="page-title">User Management</span>
  </div>
  <button class="btn btn-primary" (click)="openCreate()">
    <i class="ti ti-user-plus"></i> Add user
  </button>
</div>

<div class="page-content">
  <div class="items-table-wrap">
    <div class="table-header">
      <span style="font-size:13px;font-weight:500;color:var(--text2)">Team members</span>
    </div>
    <div style="padding:0 4px">
      <table class="user-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Username</th>
            <th>Role</th>
            <th style="text-align:right">Actions</th>
          </tr>
        </thead>
        <tbody>
          @for (user of users; track user.id) {
            <tr>
              <td style="font-weight:500">{{ user.name }}</td>
              <td style="font-family:var(--mono);font-size:12px;color:var(--text2)">{{ user.username }}</td>
              <td>
                <span class="role-badge" [class.role-admin]="user.role === 'admin'" [class.role-user]="user.role === 'user'">
                  {{ user.role }}
                </span>
              </td>
              <td style="text-align:right">
                <div class="actions-cell" style="justify-content:flex-end">
                  <button class="icon-btn" (click)="openEdit(user)">
                    <i class="ti ti-edit" style="font-size:14px"></i>
                  </button>
                  @if (user.id !== currentUserId) {
                    <button class="icon-btn danger" (click)="confirmDelete(user)">
                      <i class="ti ti-trash" style="font-size:14px"></i>
                    </button>
                  }
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- User Modal -->
@if (showModal) {
  <div class="modal-overlay open" (click)="closeModal()">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-head">
        <h3>{{ editingId ? 'Edit user' : 'Add user' }}</h3>
        <button class="icon-btn" (click)="closeModal()"><i class="ti ti-x"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Display name *</label>
          <input type="text" [(ngModel)]="form.name" placeholder="Full name" />
        </div>
        <div class="form-group">
          <label>Username *</label>
          <input type="text" [(ngModel)]="form.username" placeholder="login handle" />
        </div>
        <div class="form-group">
          <label>Password {{ editingId ? '(leave blank to keep)' : '*' }}</label>
          <input type="password" [(ngModel)]="form.password" placeholder="Min 6 characters" />
        </div>
        <div class="form-group">
          <label>Role</label>
          <select [(ngModel)]="form.role">
            <option value="user">Member</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" (click)="closeModal()">Cancel</button>
        <button class="btn btn-primary" (click)="save()">
          <i class="ti ti-check"></i> Save
        </button>
      </div>
    </div>
  </div>
}
