<div class="login-view">
  <div class="login-box">

    <div class="login-logo">
      <div class="logo-mark"><i class="ti ti-topology-star-3"></i></div>
      <span>TaskFlow</span>
    </div>

    <h2>Welcome back</h2>
    <p>Sign in to access your team workspace.</p>

    @if (error()) {
      <div class="login-error show">
        <i class="ti ti-alert-circle"></i> Invalid username or password.
      </div>
    }

    <div class="field">
      <label>Username</label>
      <input
        type="text"
        [(ngModel)]="username"
        placeholder="your username"
        autocomplete="username"
        (keydown)="onKeydown($event)"
      />
    </div>

    <div class="field">
      <label>Password</label>
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="••••••••"
        autocomplete="current-password"
        (keydown)="onKeydown($event)"
      />
    </div>

    <button class="btn btn-primary btn-full" (click)="submit()">
      <i class="ti ti-login"></i> Sign in
    </button>

  </div>
</div>
